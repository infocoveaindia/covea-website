<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Health Insurance - COVEA</title>  
<style>  
body{  
  margin:0;  
  font-family:Arial, Helvetica, sans-serif;  
  background:#f4efec;  
  display:flex;  
  flex-direction:column;  
  min-height:100vh;  
}  
  
/* NAVBAR */  
.navbar{  
  display:flex;  
  justify-content:space-between;  
  padding:15px 40px;  
  background:white;  
}  
.logo{  
  font-weight:bold;  
  color:#5b3a36;  
  text-decoration:none;  
}  
  
/* HERO */  
.hero{  
  background:url('https://images.unsplash.com/photo-1584515933487-779824d29309');  
  background-size:cover;  
  background-position:center;  
  height:300px;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  color:white;  
  text-align:center;  
  position:relative;  
}  
.hero::before{  
  content:"";  
  position:absolute;  
  width:100%;  
  height:100%;  
  background:rgba(0,0,0,0.5);  
}  
.hero h1{  
  position:relative;  
  z-index:2;  
  font-size:36px;  
}  
  
/* COMING SOON */  
.coming-soon{  
  flex:1;  
  display:flex;  
  flex-direction:column;  
  justify-content:center;  
  align-items:center;  
  text-align:center;  
  padding:50px;  

  /* ✅ BACKGROUND IMAGE ADDED */
  background:url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1f');  
  background-size:cover;  
  background-position:center;  
  position:relative;  
  color:white;  
}  

/* ✅ OVERLAY FOR VISIBILITY */
.coming-soon::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.coming-soon *{
  position:relative;
  z-index:2;
}

.coming-soon h2{  
  font-size:32px;  
  margin-bottom:20px;  
}  
.coming-soon p{  
  font-size:18px;  
  margin-bottom:30px;  
}  
  
/* IMAGE */  
.coming-soon img{  
  width:350px;  
  max-width:90%;  
  border-radius:10px;  
  box-shadow:0 4px 10px rgba(0,0,0,0.1);  
}  
  
/* FOOTER */  
.footer{  
  background:#6b4a46;  
  color:white;  
  padding:40px;  
  display:flex;  
  justify-content:space-between;  
  flex-wrap:wrap;  
}  
</style>  
</head>  
<body>  
  
<div class="navbar">  
  <a href="index.html" class="logo">COVEA</a>  
</div>  
  
<div class="hero">  
  <h1>Health Insurance</h1>  
</div>  
  
<div class="coming-soon">  
  <h2>Coming Soon!</h2>  
  <p>Our Health Insurance products will be available shortly. Stay tuned.</p>  
  <img src="https://images.unsplash.com/photo-1588776814546-ec7e8b2dcf9d" alt="Health Insurance">  
</div>  
  
<div class="footer">  
  <div>  
    <h3>COVEA</h3>  
    <p>Private Limited Company</p>  
    <p>India</p>  
  </div>  
  <div>  
    <h3>Contact</h3>  
    <p>Phone: 8800208059</p>  
    <p>Email: info.covea.india@gmail.com</p>  
  </div>  
</div>  
  
</body>  
</html>
