<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COVEA Private Limited</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4efec;
}

/* TOP BAR */

.topbar{
background:#3b2624;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.topbar span{
display:inline-block;
padding-left:100%;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
}

.logo{
font-size:22px;
font-weight:bold;
color:#5b3a36;
text-decoration:none;
}

.nav-links a{
margin:0 15px;
text-decoration:none;
color:#333;
cursor:pointer;
}

.nav-buttons button{
margin-left:10px;
padding:8px 15px;
border:none;
background:#6b4a46;
color:white;
border-radius:5px;
cursor:pointer;
}

/* SLIDER FIXED SPEED */

.slider{
width:100%;
overflow:hidden;
}

.slides{
display:flex;
width:700%;
animation:slide 40s linear infinite; /* SPEED MATCHED WITH TOPBAR */
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
}

@keyframes slide{
0%{transform:translateX(0)}
100%{transform:translateX(-600%)}
}

/* HERO */

.hero{
position:relative;
text-align:center;
color:white;
}

.hero img{
width:100%;
height:450px;
object-fit:cover;
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.hero-text h1{
font-size:42px;
margin:0;
}

.hero-text p{
margin-top:10px;
}

.hero-text button{
margin-top:15px;
padding:10px 20px;
background:#6b4a46;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* CATEGORY */

.category{
padding:50px;
text-align:center;
}

.category-list{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.category-item{
cursor:pointer;
text-decoration:none;
color:black;
}

.category-item img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
}

.category-item p{
margin-top:8px;
}

/* PRODUCTS */

.products{
padding:40px;
text-align:center;
}

.product-grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.product{
background:white;
padding:20px;
border-radius:10px;
width:220px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:6px;
}

.product button{
margin-top:10px;
background:#6b4a46;
color:white;
border:none;
padding:8px 15px;
border-radius:4px;
cursor:pointer;
}

/* CRAFTING */

.crafting{
text-align:center;
padding:40px;
}

/* FOOTER */

.footer{
background:#6b4a46;
color:white;
padding:40px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
width:300px;
border-radius:8px;
}

.modal-box input{
width:100%;
margin:8px 0;
padding:8px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
}

.whatsapp img{
width:55px;
}

</style>

</head>

<body>

<div class="topbar">
<span>Innovation Solution for Tomorrow</span>
</div>

<div class="navbar">

<a href="index.html" class="logo">COVEA</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="categories.html">Categories</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</div>

<div class="nav-buttons">
<button onclick="openForm()">Sign In</button>
</div>

</div>

</div>
