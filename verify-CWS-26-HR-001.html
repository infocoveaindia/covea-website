<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #111;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 30px;
}

/* COMMON CARD */
.card {
  width: 300px;
  height: 480px;
  border-radius: 18px;
  background: #0b0b0b;
  color: white;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* GOLD LINE */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 20px;
  right: 20px;
  height: 2px;
  background: #c9a74e;
}

/* LOGO */
.logo {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
  font-size: 18px;
  color: #c9a74e;
}

/* PHOTO */
.photo {
  width: 100px;
  height: 100px;
  margin: 25px auto;
  border: 2px solid #c9a74e;
  border-radius: 8px;
  background: #222;
}

/* TEXT */
.name {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-top: 10px;
}

.role {
  text-align: center;
  font-size: 14px;
  color: #aaa;
  margin-bottom: 15px;
}

.info {
  font-size: 13px;
  margin: 6px 0;
  text-align: center;
}

/* BACK */
.back-title {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  margin-top: 40px;
}

.tagline {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 30px;
}

.qr {
  width: 120px;
  height: 120px;
  margin: auto;
  border: 2px solid #c9a74e;
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 10px;
  text-align: center;
  width: 100%;
  color: #777;
}
</style>

</head>

<body>

<!-- FRONT -->
<div class="card">
  <div class="logo">COVEA</div>

  <div class="photo"></div>

  <div class="name">MOHAMMAD UVESH ANSARI</div>
  <div class="role">HR HEAD</div>

  <div class="info">ID: CWS-26-HR-001</div>
  <div class="info">Dept: HR</div>
  <div class="info">+91 8368490304</div>
</div>

<!-- BACK -->
<div class="card">
  <div class="back-title">Covea Wealth Solutions</div>
  <div class="tagline">Your Trusted Wealth Partner</div>

  <div class="qr"></div>

  <div class="info">www.coveawealthsolutions.com</div>
  <div class="info">info@coveawealthsolutions.com</div>

  <div class="footer">
    This card is property of Covea Wealth Solutions
  </div>
</div>

</body>
</html>
